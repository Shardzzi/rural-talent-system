
services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: rural-talent-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: rural_talent_system
      MYSQL_USER: rural_app
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: 'Asia/Shanghai'
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_logs:/var/log/mysql
      - ./database/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backups:/backups
    networks:
      - rural-talent-network
    command: --default-authentication-plugin=mysql_native_password
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "rural_app", "-p${MYSQL_PASSWORD}"]
      timeout: 20s
      retries: 10
      interval: 30s
      start_period: 60s

  # 后端 API 服务
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      PORT: 8083
      DB_TYPE: mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: rural_app
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: rural_talent_system
      JWT_SECRET: ${JWT_SECRET}
      TZ: 'Asia/Shanghai'
    volumes:
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - rural-talent-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
      replicas: 2
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/api/health"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 60s

  # 前端 Web 服务
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    restart: always
    environment:
      TZ: 'Asia/Shanghai'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rural-talent-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
      replicas: 2
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 30s

  # Nginx 反向代理和负载均衡
  nginx:
    image: nginx:alpine
    container_name: rural-talent-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - rural-talent-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 30s

  # Redis 缓存服务（可选）
  redis:
    image: redis:7-alpine
    container_name: rural-talent-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - rural-talent-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 30s

  # 监控服务（可选）
  watchtower:
    image: containrrr/watchtower
    container_name: rural-talent-watchtower
    restart: always
    environment:
      WATCHTOWER_CLEANUP: 'true'
      WATCHTOWER_POLL_INTERVAL: 3600
      WATCHTOWER_INCLUDE_STOPPED: 'false'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable rural-talent
    networks:
      - rural-talent-network

# 网络配置
networks:
  rural-talent-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: rural-talent-br
    ipam:
      driver: default
      config:
        - subnet: 172.21.0.0/16

# 数据卷配置
volumes:
  mysql_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/mysql
  mysql_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs/mysql
  backend_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs/backend
  nginx_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs/nginx
  redis_data:
    driver: local